name: Cache Projects Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract repos from data files
        id: repos
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/bin/yq
          fi
          yq --version
          echo "Data files found:"
          ls -la data/projects* 2>/dev/null || echo "  No data/projects* files"
          repos=""
          for f in data/projects*.yml data/projects*.yaml; do
            [ -f "$f" ] || continue
            echo "Processing: $f"
            # Use explicit array iteration for better compatibility
            extracted=$(yq '[.[].repos[]] | unique | .[]' "$f" 2>&1) || true
            echo "  Extracted: $extracted"
            repos="$repos"$'\n'"$extracted"
          done
          repos=$(echo "$repos" | sort -u | grep -v '^$' || true)
          echo "$repos" > /tmp/repos.txt
          echo "Found repos:"
          cat /tmp/repos.txt
          if [ -z "$repos" ]; then
            echo "No repos found, skipping cache update"
          fi

      - name: Fetch repo data from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cache_file="data/caches/projects.json"
          mkdir -p data/caches

          # Load existing cache if present
          if [ -f "$cache_file" ]; then
            existing=$(cat "$cache_file")
          else
            existing="{}"
          fi

          result="{}"
          cached_count=0
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Fetching: $repo"

            # Get repo info
            repo_json=$(gh api "repos/$repo" 2>/dev/null) || {
              echo "  Failed to fetch repo info, skipping"
              continue
            }

            # Get README content
            readme_content=""
            readme_html_url=""
            readme_json=$(gh api "repos/$repo/readme" 2>/dev/null) || true
            if [ -n "$readme_json" ]; then
              readme_content=$(echo "$readme_json" | jq -r '.content // empty' | base64 -d 2>/dev/null) || true
              readme_html_url=$(echo "$readme_json" | jq -r '.html_url // empty') || true
            fi

            if [ -z "$readme_content" ]; then
              echo "  No README found, skipping"
              continue
            fi

            echo "  README length: ${#readme_content} chars"

            # Write readme content to temp file to avoid shell escaping issues
            echo "$readme_content" > /tmp/readme_content.txt
            printf '%s' "$readme_html_url" > /tmp/readme_html_url.txt

            # Merge repo info with readme
            entry=$(echo "$repo_json" | jq -c \
              --rawfile readme_content /tmp/readme_content.txt \
              --rawfile readme_html_url /tmp/readme_html_url.txt \
              '. + {
                readme: {
                  content: $readme_content,
                  html_url: ($readme_html_url | gsub("\n"; ""))
                }
              }') || true

            if [ -z "$entry" ] || [ "$entry" = "null" ]; then
              echo "  Failed to build entry, skipping"
              continue
            fi

            # Add to result, keyed by full_name
            full_name=$(echo "$repo_json" | jq -r '.full_name') || true
            # Write entry to temp file to avoid shell escaping
            echo "$entry" > /tmp/entry.json
            result=$(echo "$result" | jq -c --arg key "$full_name" --slurpfile val /tmp/entry.json '. + {($key): $val[0]}') || true
            cached_count=$((cached_count + 1))
            echo "  Cached: $full_name"
          done < /tmp/repos.txt

          echo "Total repos cached: $cached_count"
          echo "Result keys: $(echo "$result" | jq -r 'keys | length' 2>/dev/null || echo 0)"

          # Merge with existing cache (keep entries not in current list)
          echo "$result" > /tmp/fresh.json
          echo "$existing" > /tmp/existing.json
          merged=$(jq -n --slurpfile existing /tmp/existing.json --slurpfile fresh /tmp/fresh.json '$existing[0] * $fresh[0]') || true
          if [ -n "$merged" ] && [ "$merged" != "null" ]; then
            echo "$merged" | jq '.' > "$cache_file"
            echo "Cache updated: $cache_file ($(echo "$merged" | jq 'keys | length') repos)"
          else
            echo "Warning: merged result is empty, skipping write"
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_user_name: Cell[bot]
          commit_user_email: lrhx@users.noreply.github.com
          commit_author: Cell[bot] <lrhx@users.noreply.github.com>
          commit_message: 'chore(data): update projects cache'
