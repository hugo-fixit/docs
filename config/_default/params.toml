post = ""
# whether to use typeit animation for title name
typeit = false

# Header subtitle config
[header.subtitle]
# subtitle name
name = ""
# whether to use typeit animation for subtitle name
typeit = false

# Breadcrumb config
[breadcrumb]
enable = true
sticky = true
show_home = false
separator = "/"
capitalize = true

# Post navigation config
[navigation]
# whether to show the post navigation in section pages scope
in_section = false
# whether to reverse the next/previous post navigation order
reverse = false

# Footer config
[footer]
enable = true
# whether to show copyright info
copyright = true
# whether to show the author
author = true
# site creation year
since = "2021"
# TODO whether to show total word count of site content
word_count = true
# Public network security only in China (HTML format is supported)
gov = ""
# ICP info only in China (HTML format is supported)
icp = ""
# license info (HTML format is supported)
