[cse.bing]
cx = ""

# Header configuration.
[header]
# Desktop header mode.
# available values: ["sticky", "normal", "auto"]
desktop_mode = "sticky"
# Mobile header mode.
# available values: ["sticky", "normal", "auto"]
mobile_mode = "auto"
