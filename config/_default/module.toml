# -------------------------------------------------------------------------------------
# Modules Configuration | 模块配置
# See: https://gohugo.io/configuration/module/
# https://github.com/gohugoio/hugo/pull/13966
#
# - 设置 version 后，模块视为直接依赖由 hugo.direct.sum 管理，
#   否则视为间接依赖由 go.mod 和 go.sum 管理。
# - 命令 hugo mod get 只能在没有设置 version 的情况下导入模块，
#   或设置一个松散的版本查询（比如 main、latest、>v1.0.0）。
# - 本地调试时不要指定 version，否则 hugo.work 不会生效。
# -------------------------------------------------------------------------------------

[[imports]]
path = "github.com/hugo-fixit/FixIt"

[[imports]]
path = "github.com/hugo-fixit/cmpt-santa-hat"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/cmpt-translate"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/component-projects"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/shortcode-asciinema"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/shortcode-caniuse"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/shortcode-docs-bookmark"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/shortcode-missing-translation"
version = "latest"

[[imports]]
path = "github.com/hugo-fixit/shortcode-rewards"
version = "latest"

[hugoVersion]
extended = true
min = "0.156.0"
